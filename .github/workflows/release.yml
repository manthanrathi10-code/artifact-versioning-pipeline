name: Release Pipeline

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Get Version
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Get Commit SHA
        id: sha
        run: echo "SHA=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Docker Login
        uses: docker/login-action@v3
        with:
          username: ${{ manthanrathi10-code }}
          password: ${{ Manthan@02 }}

      - name: Build Docker Image
        run: |
          docker build -t ${{  manthanrathi10-code }}/artifact-versioning:${{ steps.version.outputs.VERSION }} .
          docker tag ${{  manthanrathi10-code }}/artifact-versioning:${{ steps.version.outputs.VERSION }} ${{  manthanrathi10-code }}/artifact-versioning:${{ steps.sha.outputs.SHA }}

      - name: Push Version Tag
        run: docker push ${{  manthanrathi10-code }}/artifact-versioning:${{ steps.version.outputs.VERSION }}

      - name: Push SHA Tag
        run: docker push ${{  manthanrathi10-code }}/artifact-versioning:${{ steps.sha.outputs.SHA }}

      - name: Generate Changelog
        run: |
          echo "# Changes" > CHANGELOG.md
          git log --pretty=format:"- %s" -10 >> CHANGELOG.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: CHANGELOG.md